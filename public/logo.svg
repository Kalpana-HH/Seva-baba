<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 410" width="100%" height="100%">
  <!-- Icon Group -->
  <g transform="translate(15, 10)">
    <!-- Smartphone Frame -->
    <rect x="55" y="20" width="125" height="210" rx="22" fill="none" stroke="#C87413" stroke-width="10" />
    <!-- Speaker notch -->
    <rect x="97.5" y="31" width="40" height="6" rx="3" fill="#C87413" />
    <!-- Home button -->
    <circle cx="117.5" cy="211" r="6" fill="#C87413" />
    <!-- Checkmark inside screen -->
    <path d="M 85 125 L 110 152 L 160 95" fill="none" stroke="#C87413" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Fork (4 tines) -->
    <path d="M 195 72 L 195 110 C 195 122 210 122 210 110 L 210 72 M 200 72 L 200 108 M 205 72 L 205 108 M 202.5 120 L 202.5 230" 
          fill="none" stroke="#C87413" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Plate Rings -->
    <!-- Outer Plate Circle -->
    <circle cx="285" cy="140" r="68" fill="none" stroke="#C87413" stroke-width="10" />
    <!-- Inner Plate Circle -->
    <circle cx="285" cy="140" r="44" fill="none" stroke="#C87413" stroke-width="7" />

    <!-- Butter Knife -->
    <!-- Curved blade and straight handle on right -->
    <path d="M 370 230 L 370 145 C 370 130 380 112 380 90 C 380 74 370 72 367 72 C 362 72 360 82 360 100 L 360 145 L 360 230 Z" 
          fill="#C87413" stroke="#C87413" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Brand Title: THE MENU CREW -->
  <text x="250" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="37" letter-spacing="2.5" fill="#B25E00">THE MENU CREW</text>

  <!-- Slogan: Tap. Sign up. Eat. -->
  <text x="250" y="368" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="28" letter-spacing="0.5" fill="#1F2937">Tap. Sign up. Eat.</text>
</svg>
